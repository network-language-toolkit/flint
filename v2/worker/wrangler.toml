name = "flint-embed"
main = "worker.js"
compatibility_date = "2026-05-17"

[vars]
BILL_TO = "network-language-toolkit"
ALLOWED_ORIGIN = "https://flint.networklanguagetoolkit.com"

# HF_TOKEN is a secret — set via:
#   wrangler secret put HF_TOKEN
# (paste the hf_… token when prompted; never commit it)

[[ratelimits]]
name = "RATELIMITER"
namespace_id = "1001"
simple = { limit = 60, period = 60 }
